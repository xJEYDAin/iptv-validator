name: Daily IPTV Validation

on:
  schedule:
    # 每天凌晨3:30 (UTC+8) - 晚于 iptv-scraper 30分钟
    - cron: '30 3 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: '强制验证所有 URL（忽略缓存）'
        required: false
        default: 'false'

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout iptv-validator
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout iptv-scraper (read-only, 获取 filtered)
        uses: actions/checkout@v4
        with:
          repository: xJEYDAin/iptv-scraper
          path: iptv-scraper
          fetch-depth: 1

      - name: Copy filtered from iptv-scraper (本地使用，不 commit)
        run: |
          mkdir -p filtered
          rm -rf filtered/* 2>/dev/null || true
          if [ "$(ls -A iptv-scraper/filtered/*.m3u* 2>/dev/null)" ]; then
            cp iptv-scraper/filtered/*.m3u* filtered/
            echo "✓ 复制 $(ls filtered/*.m3u* 2>/dev/null | wc -l) 个 filtered 文件"
          else
            echo "⚠ iptv-scraper 暂无 filtered 文件"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -q -r requirements.txt

      - name: Run validation
        run: python scripts/validate_all.py
        env:
          FORCE_VALIDATE: ${{ inputs.force == 'true' && 'true' || 'false' }}

      - name: Push validation cache to iptv-validator
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.name "iptv-validator"
          git config --local user.email "validator@iptv"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/xJEYDAin/iptv-validator.git"
          git add -f cache/validation_cache.json
          git commit -m "Update validation cache: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          git push origin main

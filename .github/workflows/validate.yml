name: Daily IPTV Validation

on:
  schedule:
    # 每天凌晨 3:00 (UTC+8) 验证
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: '强制验证所有 URL（忽略缓存）'
        required: false
        default: 'false'

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout iptv-scraper
        uses: actions/checkout@v4
        with:
          repository: xJEYDAin/iptv-scraper
          path: iptv-scraper
          fetch-depth: 1

      - name: Sync filtered/ from iptv-scraper
        run: |
          mkdir -p filtered
          rm -rf filtered/* 2>/dev/null || true
          if [ -d "iptv-scraper/filtered" ] && [ "$(ls -A iptv-scraper/filtered/*.m3u* 2>/dev/null)" ]; then
            cp -r iptv-scraper/filtered/* filtered/
          fi
          echo "Synced $(ls filtered/*.m3u* 2>/dev/null | wc -l) filtered files"
          if [ $(ls filtered/*.m3u* 2>/dev/null | wc -l) -eq 0 ]; then
            echo "Warning: No files in filtered/, but continuing..."
          fi

      - name: Commit filtered changes
        run: |
          git config --local user.name "iptv-validator"
          git config --local user.email "validator@iptv"
          git add filtered/
          if git diff --staged --quiet; then
            echo "No filtered changes to commit"
          else
            git commit -m "Sync filtered playlists: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            git push
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -q -r requirements.txt

      - name: Run validation
        run: |
          python scripts/validate_all.py
        env:
          FORCE_VALIDATE: ${{ inputs.force == 'true' && 'true' || 'false' }}

      - name: Copy cache to iptv-scraper
        run: |
          mkdir -p iptv-scraper/cache
          cp cache/validation_cache.json iptv-scraper/cache/
          echo "Copied cache to iptv-scraper"
          cat iptv-scraper/cache/validation_cache.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'Cache entries: {len(d)}')"

      - name: Push validation cache to iptv-scraper
        run: |
          cd iptv-scraper
          git config --local user.name "iptv-validator"
          git config --local user.email "validator@iptv"
          git config --local push.default simple
          # Set remote URL for iptv-scraper
          git remote set-url origin https://xJEYDAin:${GITHUB_TOKEN}@github.com/xJEYDAin/iptv-scraper.git
          git add -f cache/validation_cache.json
          if git diff --staged --quiet; then
            echo "No cache changes to commit"
          else
            git commit -m "Update validation cache: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push validation cache
        run: |
          git config --local user.name "iptv-validator"
          git config --local user.email "validator@iptv"
          git config --local push.default simple
          git add -f cache/validation_cache.json
          if git diff --staged --quiet; then
            echo "No cache changes to commit"
          else
            git commit -m "Update validation cache: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            git push
          fi
